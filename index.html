<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CleverTap WebView Bridge</title>
  <style>
    body {
      font-family: Arial;
      background: #08111f;
      color: white;
      padding: 24px;
    }
    button {
      width: 100%;
      padding: 16px;
      margin-top: 14px;
      border-radius: 10px;
      border: none;
      background: #2f6fed;
      color: white;
      font-size: 16px;
      font-weight: bold;
    }
    input {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
      box-sizing: border-box;
    }
  </style>
</head>

<body>
  <h2>CleverTap WebView Bridge</h2>
  <p>This is a hosted web page. In app WebView, it sends data to CleverTap mobile SDK.</p>

  <input id="identity" value="webview_user_001" placeholder="Identity" />
  <input id="email" value="webview@test.com" placeholder="Email" />
  <input id="phone" value="+919999999999" placeholder="Phone" />

  <button onclick="loginUser()">On User Login</button>
  <button onclick="recordEvent()">Record Event</button>
  <button onclick="profilePush()">Profile Push</button>

  <script>
    function sendToApp(payload) {
      if (window.ReactNativeWebView) {
        window.ReactNativeWebView.postMessage(JSON.stringify(payload));
      } else {
        alert("Opened in browser. WebView bridge is not available.");
        console.log("Browser Payload:", payload);
      }
    }

    function loginUser() {
      sendToApp({
        type: "onUserLogin",
        data: {
          Identity: document.getElementById("identity").value,
          Email: document.getElementById("email").value,
          Phone: document.getElementById("phone").value,
          Name: "WebView User",
          "MSG-push": true,
          "MSG-email": true,
          "MSG-sms": true,
          "MSG-whatsapp": true
        }
      });
    }

    function recordEvent() {
      sendToApp({
        type: "recordEvent",
        eventName: "WebView Button Clicked",
        data: {
          Source: "Hosted WebView Page",
          Page: "Bridge Demo"
        }
      });
    }

    function profilePush() {
      sendToApp({
        type: "profileSet",
        data: {
          WebView_User: true,
          Source: "Hosted WebView Page"
        }
      });
    }
  </script>
</body>
</html>
